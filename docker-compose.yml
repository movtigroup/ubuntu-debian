services:
  mirror-proxy:
    build: .
    container_name: smart-mirror-proxy
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Tehran   # منطقه زمانی (اختیاری)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s   # صبر برای اولین health check (بعد از راه‌اندازی کامل)
